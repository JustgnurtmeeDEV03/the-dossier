spring:
  application:
    name: the-dossier

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:tutorsmart_db}
    username: ${DB_USERNAME:tutorsmart_admin}
    password: ${DB_PASSWORD:tutorsmart_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    # Base64-encoded key, tối thiểu 32 bytes cho HS256
    # Giá trị dưới đây CHỈ dùng cho local dev
    # Production: set biến môi trường JWT_SECRET với key ngẫu nhiên
    secret: ${JWT_SECRET}
    access-token-expiry: 900000 # 15 phút (ms)
    refresh-token-expiry: 604800000  # 7 ngày (ms)

# Swagger UI config
springdoc:
  api-docs:
    path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
    components:
      security-schemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearer-format: JWT