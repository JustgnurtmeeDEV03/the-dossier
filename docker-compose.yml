version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dossier-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dossier_admin -d dossier_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: